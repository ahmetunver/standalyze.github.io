<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ERİŞİM KORUMASI: yalnızca çalışan olarak giriş yapanlar görebilir -->
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.16/dist/amazon-cognito-identity.min.js"></script>
  <script src="auth.js"></script>
  <script>Auth.requireAuth('employee');</script>
  <title>Standalyze — Takip Raporum</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="stylesheet" href="app.css" />

</head>
<body class="page-my-report">
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="10" r="2.5"/>
          </svg>
        </div>
        <div class="brand-name">Stand<span>alyze</span></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section-label">Hesabım</div>
      <a class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Takip Raporum
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="logout()" title="Çıkış Yap">
        <div class="user-avatar" id="navAvatar">--</div>
        <div><div class="user-name" id="navName">Çalışan</div><div class="user-role">Çalışan · Çıkış için tıkla</div></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Takip Raporum</div>
      <div class="topbar-right">
        <span id="dataSource" style="font-size:11px;font-weight:600;color:#8B85A8">● Yükleniyor...</span>
        <span class="topbar-date" id="dateStr"></span>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div>
          <h2 id="greeting">Merhaba 👋</h2>
          <p id="pageSubtitle">Cam7 · Çalışma Alanı · kişisel aktivite özetin yükleniyor...</p>
        </div>
        <div class="header-actions">
          <button class="btn-outline" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV İndir
          </button>
          <button class="btn-outline danger" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Çıkış Yap
          </button>
        </div>
      </div>

      <!-- stat cards -->
      <div class="stat-row" id="statRow"></div>

      <!-- charts -->
      <div class="charts-grid">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Kişisel Aktivite Dağılımı</div>
              <div class="panel-sub">Bugünkü toplam sürenin dağılımı</div>
            </div>
          </div>
          <canvas id="donutChart"></canvas>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Aktivite Detayı</div>
              <div class="panel-sub">Süre ve yüzde olarak</div>
            </div>
          </div>
          <div id="barList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Aynı veri kaynağı (sunucu yoksa yerel yedek) ──
  const FALLBACK = {"berk":{"sitting":{"seconds":12.5,"percent":4.0},"standing":{"seconds":205.7,"percent":65.0},"unknown":{"seconds":7.2,"percent":2.3},"walking":{"seconds":90.9,"percent":28.7}},"kadir":{"sitting":{"seconds":270.6,"percent":13.2},"standing":{"seconds":1346.2,"percent":65.9},"unknown":{"seconds":46.9,"percent":2.3},"walking":{"seconds":379.6,"percent":18.6}},"sevcan":{"sitting":{"seconds":179.2,"percent":11.4},"standing":{"seconds":1034.5,"percent":65.5},"unknown":{"seconds":31.9,"percent":2.0},"walking":{"seconds":332.9,"percent":21.1}},"mabed":{"sitting":{"seconds":97.6,"percent":20.1},"standing":{"seconds":282.0,"percent":58.0},"unknown":{"seconds":9.0,"percent":1.9},"walking":{"seconds":97.4,"percent":20.0}},"mazhar":{"sitting":{"seconds":21.0,"percent":7.5},"standing":{"seconds":187.3,"percent":67.3},"unknown":{"seconds":6.2,"percent":2.2},"walking":{"seconds":63.7,"percent":22.9}},"kevser":{"sitting":{"seconds":2.7,"percent":2.6},"standing":{"seconds":62.7,"percent":60.9},"unknown":{"seconds":3.5,"percent":3.4},"walking":{"seconds":34.1,"percent":33.1}},"sevgi":{"sitting":{"seconds":12.0,"percent":16.0},"standing":{"seconds":35.4,"percent":47.1},"unknown":{"seconds":2.2,"percent":2.9},"walking":{"seconds":25.6,"percent":34.1}}};

  const USER = sessionStorage.getItem('user') || (window.Auth && Auth.usernameSync && Auth.usernameSync()) || '';  // giriş yapan çalışan
  const CAP  = USER ? USER.charAt(0).toUpperCase() + USER.slice(1) : 'Çalışan';

  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('tr-TR', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('navName').textContent = CAP;
  document.getElementById('navAvatar').textContent = (USER || '--').slice(0,2).toUpperCase();

  function logout() {
    Auth.logout();
  }

  function secFmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.round(s % 60);
    return m > 0 ? `${m}dk ${sec}s` : `${sec}s`;
  }

  // ── AWS YAPILANDIRMASI ──────────────────────────────────────────────
  const API_URL = 'https://y4ubflxdcc.execute-api.eu-central-1.amazonaws.com';  // Lambda hazır olunca buraya API Gateway URL'ini yapıştır
  // ────────────────────────────────────────────────────────────────────

  async function loadData() {
    let data;
    if (API_URL) {
      try {
        // Her iki kameranın birleşik verisini çek — çalışan hangi kamerada görünmüşse gelsin
        const res = await fetch(`${API_URL}/reports?camera=both`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        data = (raw && raw.merged) ? raw.merged : raw;
        document.getElementById('dataSource').textContent = '● AWS Canlı Veri';
        document.getElementById('dataSource').style.color = '#16A34A';
      } catch(e) {
        console.warn('AWS API erişilemedi:', e.message);
        data = FALLBACK;
        document.getElementById('dataSource').textContent = '● Yerel Veri';
        document.getElementById('dataSource').style.color = '#D97706';
      }
    } else {
      try {
        const res = await fetch('http://localhost:8080/cam7_report.json');
        if (!res.ok) throw new Error();
        data = await res.json();
        document.getElementById('dataSource').textContent = '● Yerel Sunucu';
        document.getElementById('dataSource').style.color = '#2563EB';
      } catch {
        data = FALLBACK;
        document.getElementById('dataSource').textContent = '● Yerel Veri';
        document.getElementById('dataSource').style.color = '#D97706';
      }
    }
    // ── YALNIZCA giriş yapan çalışanın kendi verisi ──
    const me = data[USER];
    if (!me) {
      document.getElementById('greeting').textContent = `Merhaba, ${CAP}`;
      document.getElementById('pageSubtitle').textContent = 'Henüz sana ait analiz verisi bulunmuyor.';
      document.getElementById('statRow').innerHTML =
        '<div class="panel" style="grid-column:1/-1;text-align:center;color:#8B85A8;font-size:13px">Kayıt bulunamadı.</div>';
      return;
    }

    render(me);
  }

  function render(a) {
    const total = a.standing.seconds + a.walking.seconds + a.sitting.seconds + a.unknown.seconds;

    document.getElementById('greeting').textContent = `Merhaba, ${CAP} 👋`;
    document.getElementById('pageSubtitle').textContent =
      `Cam7 · Çalışma Alanı · bugün toplam ${(total/60).toFixed(1)} dk analiz edildi`;

    // stat cards
    const stats = [
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" width="17" height="17"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, label:'Toplam Süre', val:(total/60).toFixed(1)+'dk', sub:'bugün analiz edildi', bg:'#F0FFF8', col:'#16A34A' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#7060D0" stroke-width="2" width="17" height="17"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><line x1="9" y1="12" x2="15" y2="12"/></svg>`, label:'Ayakta', val:Math.round(a.standing.percent)+'%', sub:secFmt(a.standing.seconds), bg:'#EFECFF', col:'#7060D0' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#5E87D4" stroke-width="2" width="17" height="17"><circle cx="12" cy="5" r="3"/><path d="M9 21l3-8 3 8"/><path d="M6 12l6 2 6-2"/></svg>`, label:'Yürüme', val:Math.round(a.walking.percent)+'%', sub:secFmt(a.walking.seconds), bg:'#EFF6FF', col:'#5E87D4' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#D06080" stroke-width="2" width="17" height="17"><path d="M3 18h18M6 18V9a6 6 0 0 1 12 0v9"/></svg>`, label:'Oturma', val:Math.round(a.sitting.percent)+'%', sub:secFmt(a.sitting.seconds), bg:'#FFF0F6', col:'#D06080' },
    ];
    document.getElementById('statRow').innerHTML = stats.map(s => `
      <div class="stat-card">
        <div class="stat-top"><div class="stat-icon" style="background:${s.bg}">${s.icon}</div></div>
        <div class="stat-num" style="color:${s.col}">${s.val}</div>
        <div class="stat-label">${s.label}</div>
        <div class="stat-sub">${s.sub}</div>
      </div>
    `).join('');

    // donut — kişisel dağılım
    new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: ['Ayakta','Yürüme','Oturma','Bilinmiyor'],
        datasets: [{
          data: [a.standing.seconds, a.walking.seconds, a.sitting.seconds, a.unknown.seconds].map(v => +v.toFixed(1)),
          backgroundColor: ['#7060D0','#5E87D4','#D06080','#E0DAF8'],
          borderWidth: 0, hoverOffset: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '68%',
        plugins: {
          legend: { position:'bottom', labels:{ font:{family:'Plus Jakarta Sans',size:11}, padding:12, usePointStyle:true } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${(ctx.raw/60).toFixed(1)}dk (${Math.round(ctx.raw/total*100)}%)` } }
        }
      }
    });

    // aktivite detay barları
    const acts = [
      { label:'Ayakta',     d:a.standing, color:'#7060D0' },
      { label:'Yürüme',     d:a.walking,  color:'#5E87D4' },
      { label:'Oturma',     d:a.sitting,  color:'#D06080' },
      { label:'Bilinmiyor', d:a.unknown,  color:'#C0BAD8' },
    ];
    document.getElementById('barList').innerHTML = acts.map(x => `
      <div class="bar-row">
        <span class="bar-label">${x.label}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${x.d.percent}%;background:${x.color}"></div></div>
        <span class="bar-pct" style="color:${x.color}">${Math.round(x.d.percent)}%</span>
        <span class="bar-sec">${secFmt(x.d.seconds)}</span>
      </div>
    `).join('');

    // CSV için sakla
    window.__me = a;
  }

  function exportCSV() {
    const a = window.__me;
    if (!a) return;
    const total = a.standing.seconds + a.walking.seconds + a.sitting.seconds + a.unknown.seconds;
    const rows = [
      ['İsim','Ayakta(s)','Ayakta(%)','Yürüme(s)','Yürüme(%)','Oturma(s)','Oturma(%)','Bilinmiyor(s)','Toplam(s)'],
      [CAP, a.standing.seconds, a.standing.percent, a.walking.seconds, a.walking.percent, a.sitting.seconds, a.sitting.percent, a.unknown.seconds, total.toFixed(1)]
    ];
    const csv = rows.map(r => r.join(',')).join('\n');
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    link.download = `${USER}_takip_raporu.csv`;
    link.click();
  }

  loadData();
</script>
</body>
</html>
