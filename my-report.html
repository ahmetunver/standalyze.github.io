<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ERİŞİM KORUMASI: yalnızca çalışan olarak giriş yapanlar görebilir -->
  <script>
    (function () {
      var role = sessionStorage.getItem('role');
      var user = sessionStorage.getItem('user');
      if (role !== 'employee' || !user) {
        window.location.replace('index.html');
      }
    })();
  </script>
  <title>Standalyze — Takip Raporum</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: #F0EEF8; color: #1A1635; overflow: hidden; }
    .app { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar { width: 240px; flex-shrink: 0; background: linear-gradient(180deg,#6B5FD4 0%,#5E78D0 100%); display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .sidebar::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 80% 10%,rgba(255,255,255,0.12) 0%,transparent 50%), radial-gradient(ellipse at 20% 90%,rgba(100,140,255,0.15) 0%,transparent 50%); pointer-events:none; }
    .sidebar-top { padding:1.6rem 1.4rem 1.2rem; border-bottom:1px solid rgba(255,255,255,0.1); }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-icon { width:36px; height:36px; background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .brand-icon svg { width:18px; height:18px; }
    .brand-name { font-size:17px; font-weight:800; color:#fff; letter-spacing:-0.3px; }
    .brand-name span { opacity:0.7; }
    .nav { flex:1; padding:1rem 0.8rem; display:flex; flex-direction:column; gap:2px; }
    .nav-section-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.35); padding:0.8rem 0.6rem 0.4rem; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:background 0.15s; color:rgba(255,255,255,0.65); font-size:13px; font-weight:400; text-decoration:none; position:relative; }
    .nav-item:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .nav-item.active { background:rgba(255,255,255,0.18); color:#fff; font-weight:500; }
    .nav-item.active::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:3px; border-radius:2px; background:#fff; }
    .nav-item svg { width:16px; height:16px; flex-shrink:0; opacity:0.8; }
    .nav-item.active svg { opacity:1; }
    .sidebar-bottom { padding:1rem 0.8rem 1.4rem; border-top:1px solid rgba(255,255,255,0.1); }
    .user-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.1); cursor:pointer; transition:background 0.15s; }
    .user-card:hover { background:rgba(255,255,255,0.18); }
    .user-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#A890F0,#7EB8F0); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
    .user-name { font-size:12px; font-weight:500; color:#fff; }
    .user-role { font-size:10px; color:rgba(255,255,255,0.5); margin-top:1px; }
    .user-card svg { width:15px; height:15px; color:rgba(255,255,255,0.6); margin-left:auto; }

    /* ── MAIN ── */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { height:60px; flex-shrink:0; background:#fff; border-bottom:1px solid #E8E4F4; display:flex; align-items:center; padding:0 1.8rem; gap:1rem; }
    .topbar-title { font-size:16px; font-weight:700; color:#1A1635; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .topbar-date { font-size:12px; color:#8B85A8; }

    .content { flex:1; overflow-y:auto; padding:1.6rem 1.8rem; }
    .content::-webkit-scrollbar { width:4px; }
    .content::-webkit-scrollbar-thumb { background:#C8C0E8; border-radius:2px; }

    /* ── PAGE HEADER ── */
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.4rem; gap:1rem; flex-wrap:wrap; }
    .page-header h2 { font-size:20px; font-weight:800; letter-spacing:-0.3px; }
    .page-header p { font-size:13px; color:#8B85A8; margin-top:2px; }
    .header-actions { display:flex; gap:8px; }
    .btn-outline { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:10px; border:1.5px solid #E0DAF8; background:#fff; font-size:12px; font-weight:600; color:#7060D0; cursor:pointer; transition:all 0.15s; font-family:inherit; }
    .btn-outline:hover { background:#EFECFF; border-color:#C8C0E8; }
    .btn-outline svg { width:14px; height:14px; }
    .btn-outline.danger { color:#C03050; border-color:#F3CAD4; }
    .btn-outline.danger:hover { background:#FDEEF1; border-color:#EBB6C2; }

    /* ── STAT CARDS ── */
    .stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.4rem; }
    .stat-card { background:#fff; border:1px solid #E8E4F4; border-radius:14px; padding:1.1rem 1.2rem; }
    .stat-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
    .stat-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .stat-icon svg { width:17px; height:17px; }
    .stat-num { font-size:24px; font-weight:800; color:#1A1635; letter-spacing:-0.5px; }
    .stat-label { font-size:12px; color:#8B85A8; margin-top:2px; }
    .stat-sub { font-size:11px; color:#A89FD8; margin-top:4px; }

    /* ── PANELS ── */
    .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .panel { background:#fff; border:1px solid #E8E4F4; border-radius:14px; padding:1.3rem; }
    .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
    .panel-title { font-size:13px; font-weight:700; color:#1A1635; }
    .panel-sub { font-size:11px; color:#8B85A8; margin-top:2px; }
    canvas { max-height: 240px; }

    /* ── ACTIVITY BARS ── */
    .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .bar-row:last-child { margin-bottom:0; }
    .bar-label { font-size:12px; font-weight:600; color:#1A1635; width:80px; flex-shrink:0; }
    .bar-bg { flex:1; height:10px; background:#F0EEF8; border-radius:100px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:100px; transition:width 0.6s cubic-bezier(.22,1,.36,1); }
    .bar-pct { font-size:12px; font-weight:700; width:40px; text-align:right; flex-shrink:0; }
    .bar-sec { font-size:11px; color:#8B85A8; width:70px; text-align:right; flex-shrink:0; }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="10" r="2.5"/>
          </svg>
        </div>
        <div class="brand-name">Stand<span>alyze</span></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section-label">Hesabım</div>
      <a class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Takip Raporum
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="logout()" title="Çıkış Yap">
        <div class="user-avatar" id="navAvatar">--</div>
        <div><div class="user-name" id="navName">Çalışan</div><div class="user-role">Çalışan · Çıkış için tıkla</div></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Takip Raporum</div>
      <div class="topbar-right">
        <span id="dataSource" style="font-size:11px;font-weight:600;color:#8B85A8">● Yükleniyor...</span>
        <span class="topbar-date" id="dateStr"></span>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div>
          <h2 id="greeting">Merhaba 👋</h2>
          <p id="pageSubtitle">Cam7 · Çalışma Alanı · kişisel aktivite özetin yükleniyor...</p>
        </div>
        <div class="header-actions">
          <button class="btn-outline" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV İndir
          </button>
          <button class="btn-outline danger" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Çıkış Yap
          </button>
        </div>
      </div>

      <!-- stat cards -->
      <div class="stat-row" id="statRow"></div>

      <!-- charts -->
      <div class="charts-grid">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Kişisel Aktivite Dağılımı</div>
              <div class="panel-sub">Bugünkü toplam sürenin dağılımı</div>
            </div>
          </div>
          <canvas id="donutChart"></canvas>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Aktivite Detayı</div>
              <div class="panel-sub">Süre ve yüzde olarak</div>
            </div>
          </div>
          <div id="barList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Aynı veri kaynağı (sunucu yoksa yerel yedek) ──
  const FALLBACK = {"berk":{"sitting":{"seconds":12.5,"percent":4.0},"standing":{"seconds":205.7,"percent":65.0},"unknown":{"seconds":7.2,"percent":2.3},"walking":{"seconds":90.9,"percent":28.7}},"kadir":{"sitting":{"seconds":270.6,"percent":13.2},"standing":{"seconds":1346.2,"percent":65.9},"unknown":{"seconds":46.9,"percent":2.3},"walking":{"seconds":379.6,"percent":18.6}},"sevcan":{"sitting":{"seconds":179.2,"percent":11.4},"standing":{"seconds":1034.5,"percent":65.5},"unknown":{"seconds":31.9,"percent":2.0},"walking":{"seconds":332.9,"percent":21.1}},"mabed":{"sitting":{"seconds":97.6,"percent":20.1},"standing":{"seconds":282.0,"percent":58.0},"unknown":{"seconds":9.0,"percent":1.9},"walking":{"seconds":97.4,"percent":20.0}},"mazhar":{"sitting":{"seconds":21.0,"percent":7.5},"standing":{"seconds":187.3,"percent":67.3},"unknown":{"seconds":6.2,"percent":2.2},"walking":{"seconds":63.7,"percent":22.9}},"kevser":{"sitting":{"seconds":2.7,"percent":2.6},"standing":{"seconds":62.7,"percent":60.9},"unknown":{"seconds":3.5,"percent":3.4},"walking":{"seconds":34.1,"percent":33.1}},"sevgi":{"sitting":{"seconds":12.0,"percent":16.0},"standing":{"seconds":35.4,"percent":47.1},"unknown":{"seconds":2.2,"percent":2.9},"walking":{"seconds":25.6,"percent":34.1}}};

  const USER = sessionStorage.getItem('user');           // giriş yapan çalışan
  const CAP  = USER ? USER.charAt(0).toUpperCase() + USER.slice(1) : 'Çalışan';

  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('tr-TR', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('navName').textContent = CAP;
  document.getElementById('navAvatar').textContent = (USER || '--').slice(0,2).toUpperCase();

  function logout() {
    sessionStorage.clear();
    window.location.replace('index.html');
  }

  function secFmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.round(s % 60);
    return m > 0 ? `${m}dk ${sec}s` : `${sec}s`;
  }

  // ── AWS YAPILANDIRMASI ──────────────────────────────────────────────
  const API_URL = '';  // Lambda hazır olunca buraya API Gateway URL'ini yapıştır
  // ────────────────────────────────────────────────────────────────────

  async function loadData() {
    let data;
    if (API_URL) {
      try {
        // Her iki kameranın birleşik verisini çek — çalışan hangi kamerada görünmüşse gelsin
        const res = await fetch(`${API_URL}/reports?camera=both`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        data = (raw && raw.merged) ? raw.merged : raw;
        document.getElementById('dataSource').textContent = '● AWS Canlı Veri';
        document.getElementById('dataSource').style.color = '#16A34A';
      } catch(e) {
        console.warn('AWS API erişilemedi:', e.message);
        data = FALLBACK;
        document.getElementById('dataSource').textContent = '● Yerel Veri';
        document.getElementById('dataSource').style.color = '#D97706';
      }
    } else {
      try {
        const res = await fetch('http://localhost:8080/cam7_report.json');
        if (!res.ok) throw new Error();
        data = await res.json();
        document.getElementById('dataSource').textContent = '● Yerel Sunucu';
        document.getElementById('dataSource').style.color = '#2563EB';
      } catch {
        data = FALLBACK;
        document.getElementById('dataSource').textContent = '● Yerel Veri';
        document.getElementById('dataSource').style.color = '#D97706';
      }
    }
    // ── YALNIZCA giriş yapan çalışanın kendi verisi ──
    const me = data[USER];
    if (!me) {
      document.getElementById('greeting').textContent = `Merhaba, ${CAP}`;
      document.getElementById('pageSubtitle').textContent = 'Henüz sana ait analiz verisi bulunmuyor.';
      document.getElementById('statRow').innerHTML =
        '<div class="panel" style="grid-column:1/-1;text-align:center;color:#8B85A8;font-size:13px">Kayıt bulunamadı.</div>';
      return;
    }

    render(me);
  }

  function render(a) {
    const total = a.standing.seconds + a.walking.seconds + a.sitting.seconds + a.unknown.seconds;

    document.getElementById('greeting').textContent = `Merhaba, ${CAP} 👋`;
    document.getElementById('pageSubtitle').textContent =
      `Cam7 · Çalışma Alanı · bugün toplam ${(total/60).toFixed(1)} dk analiz edildi`;

    // stat cards
    const stats = [
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" width="17" height="17"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, label:'Toplam Süre', val:(total/60).toFixed(1)+'dk', sub:'bugün analiz edildi', bg:'#F0FFF8', col:'#16A34A' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#7060D0" stroke-width="2" width="17" height="17"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><line x1="9" y1="12" x2="15" y2="12"/></svg>`, label:'Ayakta', val:Math.round(a.standing.percent)+'%', sub:secFmt(a.standing.seconds), bg:'#EFECFF', col:'#7060D0' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#5E87D4" stroke-width="2" width="17" height="17"><circle cx="12" cy="5" r="3"/><path d="M9 21l3-8 3 8"/><path d="M6 12l6 2 6-2"/></svg>`, label:'Yürüme', val:Math.round(a.walking.percent)+'%', sub:secFmt(a.walking.seconds), bg:'#EFF6FF', col:'#5E87D4' },
      { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="#D06080" stroke-width="2" width="17" height="17"><path d="M3 18h18M6 18V9a6 6 0 0 1 12 0v9"/></svg>`, label:'Oturma', val:Math.round(a.sitting.percent)+'%', sub:secFmt(a.sitting.seconds), bg:'#FFF0F6', col:'#D06080' },
    ];
    document.getElementById('statRow').innerHTML = stats.map(s => `
      <div class="stat-card">
        <div class="stat-top"><div class="stat-icon" style="background:${s.bg}">${s.icon}</div></div>
        <div class="stat-num" style="color:${s.col}">${s.val}</div>
        <div class="stat-label">${s.label}</div>
        <div class="stat-sub">${s.sub}</div>
      </div>
    `).join('');

    // donut — kişisel dağılım
    new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: ['Ayakta','Yürüme','Oturma','Bilinmiyor'],
        datasets: [{
          data: [a.standing.seconds, a.walking.seconds, a.sitting.seconds, a.unknown.seconds].map(v => +v.toFixed(1)),
          backgroundColor: ['#7060D0','#5E87D4','#D06080','#E0DAF8'],
          borderWidth: 0, hoverOffset: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '68%',
        plugins: {
          legend: { position:'bottom', labels:{ font:{family:'Plus Jakarta Sans',size:11}, padding:12, usePointStyle:true } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${(ctx.raw/60).toFixed(1)}dk (${Math.round(ctx.raw/total*100)}%)` } }
        }
      }
    });

    // aktivite detay barları
    const acts = [
      { label:'Ayakta',     d:a.standing, color:'#7060D0' },
      { label:'Yürüme',     d:a.walking,  color:'#5E87D4' },
      { label:'Oturma',     d:a.sitting,  color:'#D06080' },
      { label:'Bilinmiyor', d:a.unknown,  color:'#C0BAD8' },
    ];
    document.getElementById('barList').innerHTML = acts.map(x => `
      <div class="bar-row">
        <span class="bar-label">${x.label}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${x.d.percent}%;background:${x.color}"></div></div>
        <span class="bar-pct" style="color:${x.color}">${Math.round(x.d.percent)}%</span>
        <span class="bar-sec">${secFmt(x.d.seconds)}</span>
      </div>
    `).join('');

    // CSV için sakla
    window.__me = a;
  }

  function exportCSV() {
    const a = window.__me;
    if (!a) return;
    const total = a.standing.seconds + a.walking.seconds + a.sitting.seconds + a.unknown.seconds;
    const rows = [
      ['İsim','Ayakta(s)','Ayakta(%)','Yürüme(s)','Yürüme(%)','Oturma(s)','Oturma(%)','Bilinmiyor(s)','Toplam(s)'],
      [CAP, a.standing.seconds, a.standing.percent, a.walking.seconds, a.walking.percent, a.sitting.seconds, a.sitting.percent, a.unknown.seconds, total.toFixed(1)]
    ];
    const csv = rows.map(r => r.join(',')).join('\n');
    const link = document.createElement('a');
    link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    link.download = `${USER}_takip_raporu.csv`;
    link.click();
  }

  loadData();
</script>
</body>
</html>
